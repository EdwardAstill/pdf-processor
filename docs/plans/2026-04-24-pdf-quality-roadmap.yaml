version: 1
plan:
  slug: pdf-quality-roadmap
  prose: docs/plans/2026-04-24-pdf-quality-roadmap.md
  goal: Improve PDF-to-markdown quality through measured local extraction fixes, table strategy upgrades, optional OCR, tagged-PDF support, and release polish.

nodes:
  - id: quality_harness
    type: implement
    description: Add reproducible fixture/reporting workflow so quality changes are measurable.
    files:
      create:
        - scripts/quality-report.sh
        - tests/quality.rs
      modify:
        - docs/TESTING.md
        - tests/golden.rs
    verify:
      - cargo test --test golden -- --nocapture
      - bash scripts/quality-report.sh
    on_fail: escalate

  - id: text_cleanup_reflow
    type: implement
    depends_on:
      - quality_harness
    description: Fix common text cleanup and paragraph reflow defects in born-digital PDFs.
    files:
      modify:
        - src/pdf/text_cleanup.rs
        - src/pdf/extractor.rs
        - src/render/markdown.rs
    verify:
      - cargo test text_cleanup render::markdown
      - cnv example/pdf/attention.pdf -o /tmp/cnv-quality-attention --no-images
    on_fail: escalate

  - id: heading_classification
    type: implement
    depends_on:
      - text_cleanup_reflow
    description: Improve heading levels and numbered section handling for academic PDFs.
    files:
      modify:
        - src/layout/classifier.rs
        - src/render/markdown.rs
        - tests/golden.rs
        - tests/snapshots/attention_page_1.md
    verify:
      - cargo test layout::classifier render::markdown
      - cargo test --test golden golden_snapshot_attention_page_1 -- --ignored --nocapture
    on_fail: escalate

  - id: table_strategy_upgrade
    type: implement
    depends_on:
      - quality_harness
      - heading_classification
    description: Replace one-off table heuristics with strategy-based table detection.
    files:
      create:
        - src/layout/table.rs
      modify:
        - src/layout/mod.rs
        - src/layout/classifier.rs
        - src/render/markdown.rs
        - tests/golden.rs
    verify:
      - cargo test layout::table render::markdown
      - cargo test --test golden -- --ignored golden_snapshot_invoice_and_form_structure
    on_fail: escalate

  - id: selective_ocr_cache
    type: implement
    depends_on:
      - quality_harness
    description: Add page-selective hybrid OCR routing and caching for scan-heavy pages.
    files:
      modify:
        - src/hybrid/triage.rs
        - src/hybrid/client.rs
        - src/cli.rs
        - src/main.rs
        - tests/hybrid.rs
    verify:
      - cargo test --test hybrid -- --nocapture
    on_fail: escalate

  - id: tagged_pdf_structure
    type: implement
    depends_on:
      - heading_classification
      - table_strategy_upgrade
    description: Use PDF structure-tree metadata when available, behind the optional pdfium feature.
    files:
      modify:
        - Cargo.toml
        - src/pdf/metadata.rs
        - src/layout/classifier.rs
        - src/main.rs
        - tests/golden.rs
    verify:
      - cargo test --features pdfium-metadata
    on_fail: escalate

  - id: image_vector_handling
    type: implement
    depends_on:
      - quality_harness
    description: Improve decorative image filtering and document vector-figure limits.
    files:
      modify:
        - src/pdf/extractor.rs
        - src/main.rs
        - src/render/markdown.rs
        - tests/golden.rs
    verify:
      - cargo test render::markdown::tests::scholarly_front_matter_drops_decorative_images_and_keeps_captioned_figure
      - cargo test --test golden -- --ignored golden_corpus_sweep
    on_fail: escalate

  - id: release_polish
    type: implement
    depends_on:
      - text_cleanup_reflow
      - heading_classification
      - table_strategy_upgrade
      - selective_ocr_cache
    description: Document quality limits, examples, and final release checks.
    files:
      modify:
        - README.md
        - docs/TESTING.md
        - Cargo.toml
        - src/cli.rs
    verify:
      - cargo fmt
      - cargo test
      - cargo clippy --all-targets -- -D warnings
      - git ls-files ':(glob)**/*.png' ':(glob)**/*.pdf' | wc -l
    on_fail: escalate
